<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Screen</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    
    <div class="div_ipt_email">
        E-mail<br>
        <input id="ipt_email_user" type="email">
    </div><br>

    <div class="div_ipt_CNPJ">
        CNPJ<br>
        <input id="ipt_CNPJ">
    </div><br>

    <div class="div_ipt_senha">
        Senha <br>
        <input id="ipt_senha_user" type="password">
    </div><br>

    <div class="div_ipt_confirmaSenha">
        Confirmar Senha<br>
        <input id="ipt_confirmaSenha" type="password">
    </div><br>

    <div class="div_btn_Cadastrar">
            <button id="btn_Cadastrar" onclick="Cadastrar()">Cadastrar</button> 
    </div>

    <div class="div_btn_Entrar">
        <a href="loginPage.html">
            <button id="btn_Entrar">Login</button>
        </a>
    </div>
</body>
</html>
